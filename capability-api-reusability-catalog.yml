standards:

  - name: Naftiko Capabilities
    description: This uses a exploratory schema to help inform and shape capabilities.
    docUrl: https://naftiko.github.io/technology/docs/capabilities/

  - name: OpenAPI
    description: This uses OpenAPI to define access to all HTTP APIs.
    docUrl: https://naftiko.github.io/technology/docs/standards/openapi/

  - name: Arazzo
    description: This uses Arazzo to define workflows used to support this capability.
    docUrl: https://naftiko.github.io/technology/docs/standards/arazzo/

  - name: JSON Schema
    description: This uses JSON Schema to define and validate all entities used.
    docUrl: https://naftiko.github.io/technology/docs/standards/json-schema/    

  - name: Spectral
    description: This uses Spectral rules to define and enforce policies across entities.
    docUrl: https://naftiko.github.io/technology/docs/standards/spectral/     

  - name: Model Context Protocol
    description: This uses MCP expresed as JSON schema to define each MCP server.
    docUrl: https://naftiko.github.io/technology/docs/standards/model-context-protocol/

  - name: Bruno Collections
    description: This uses Bruno Collections to define each executable HTTP API integration.
    docUrl: https://naftiko.github.io/technology/docs/standards/bruno-collections/        

  - name: Bruno Environments
    description: This uses Bruno Environments to store keys for each API to use in automation.
    docUrl: https://naftiko.github.io/technology/docs/standards/bruno-environments/  

  - name: API Commons
    description: This uses an API Commons schema to define the plans and rate limits.
    docUrl: https://naftiko.github.io/technology/docs/standards/api-commons/      

  - name: OAuth 2.0
    description: This uses a exploratory schema to help inform and shape capabilities.
    docUrl: https://naftiko.github.io/technology/docs/standards/oauth-20/       

security:

  openAPI:

    - $ref: 'openapi/api-reusability-github-authentication.yml'  

  arazzo:

    - $ref: 'arazzo/oauth-workflow-github.yml'

services:

  - aid: aws-api-gateway
    name: AWS API Gateway
    description: Amazon API Gateway is a fully managed service that makes it easy for developers to create, publish, maintain, monitor, and secure APIs at any scale.
    docUrl: https://naftiko.github.io/technology/docs/services/aws/
    apisJson: https://raw.githubusercontent.com/api-evangelist/aws/refs/heads/main/apis.yml
    loginUrl: https://console.aws.amazon.com/console/home/
    signUpUrl: https://portal.aws.amazon.com/gp/aws/developer/registration/index.html
    termsOfServiceUrl: https://aws.amazon.com/terms/?nc1=f_pr
    privacyPolicyUrl: https://aws.amazon.com/privacy/?nc1=f_pr
    plans:
      - $ref: 'api-commons/plans-aws-api-gateway.yml'    
    rateLimits:
      - $ref: 'api-commons/rate-limits-aws-api-gateway.yml'   

  - aid: github
    name: GitHub
    description: GitHub is a web-based platform for hosting and collaborating on software projects. It’s built around Git, a version control system that tracks changes to files over time.
    docUrl: https://naftiko.github.io/technology/docs/services/github/
    apisJson: https://raw.githubusercontent.com/api-evangelist/github/refs/heads/main/apis.yml
    loginUrl: https://github.com/login
    signUpUrl: https://github.com/signup
    termsOfServiceUrl: https://docs.github.com/site-policy/github-terms/github-terms-of-service
    privacyPolicyUrl: https://docs.github.com/site-policy/privacy-policies/github-privacy-statement
    plans:
      - $ref: 'api-commons/plans-github.yml'    
    rateLimits:
      - $ref: 'api-commons/plans-github.yml'      

observability: 

    visibility: Public  