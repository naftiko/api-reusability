# This capability focuses on pulling the API catalog for the domain that will be evaluated for reuse.
# This capability provides an option for pulling API paths and schema from AWS API Gateway
# This capability provides an option for pulling OpenAPIs from a GitHub repository

naftiko:

  schema:  'https://github.com/naftiko/schema/blob/main/core/capability/capabiity-schema.yml'

info:

  name: API Reusability - Catalog
  description: This is an capability for pulling the API catalog to be used to quantify reusability for a specific domain.

  icon: https://example.com/icon.jpg

  tags:

    - APIs
    - Catalogs
    - Discovery
    - Gateway
    - OpenAPI

  jsonLd: >

    {
      "@context": "https://schema.org",
      "@type": "WebAPI"
    }    

  pinned: true
  featured: true

ports:

  source:

    - adapter: HTTP API
      aid: aws-api-gateway
      title: Amazon API Gateway Resources
      description: Pulls API resources from Amazon API Gateway.
      openApi:

        - $ref: 'openapi/api-reusability-amazon-api-gateway-retrieve-api-resources.yml'  

      brunoCollection:

        - $ref: '/bruno/amazon-api-gateway-retrieve-api-models/bruno.json'   

      brunoEnvironment:

        - $ref: '/bruno/amazon-api-gateway-retrieve-api-models/amazon-api-gateway.bru'           

    - adapter: HTTP API
      aid: aws-api-gateway
      title: Amazon API Gateway Schema
      description: Pulls API schema from Amazon API Gateway.
      openApi:

        - $ref: 'openapi/api-reusability-amazon-api-gateway-retrieve-api-schema.yml'  

      brunoCollection:

        - $ref: '/bruno/amazon-api-gateway-retrieve-api-resources/bruno.json'    

      brunoEnvironment:

        - $ref: '/bruno/amazon-api-gateway-retrieve-api-resources/amazon-api-gateway.bru'          

    - adapter: HTTP API
      aid: github
      title: GitHub Repositories OpenAPI Content
      description: Pulls OpenAPI artifacts from repository using GitHub API.
      openApi:

        - $ref: 'openapi/api-reusability-github-repository-openapi-contents.yml'  

      brunoCollection:

        - $ref: '/bruno/github-retrieve-repository-openapi-content/bruno.json'   

      brunoEnvironment:

        - $ref: '/bruno/github-retrieve-repository-openapi-content/github.bru'                                              

useCase:

  - $ref: 'https://github.com/naftiko/schema/blob/main/secondary/use-case/examples/use-case-example-api-reusability.yml' 

stakeholders:

  - FN: Kin Lane
    ROLE: Chief Community Officer (CCO)
    EMAIL: kinlane@naftiko.io
    SOCIALPROFILE: https://www.linkedin.com/in/kinlane/

events:

  - specversion: '1.0'
    type: com.amazon-api-gateway.catalog.pulled
    source: https://github.com/cloudevents/spec
    datacontenttype: application/json
    dataschema: https://github.com/cloudevents/spec/schemas/pr.json

  - specversion: '1.0'
    type: com.github.catalog.pulled
    source: https://github.com/cloudevents/spec
    datacontenttype: application/json
    dataschema: https://github.com/cloudevents/spec/schemas/pr.json

metrics:

  weavingScore: 100
  maturityScore: 25
  rating: 8
  numberOfDownloads: 100
  forks: 25
  watches: 25
  likes: 25

change:

  state: New
  
  schemaVersion: 0.1.0
  capabilityVersion: 0.1.0

  updated: 2025-12-18T00:00:00Z
  created: 2025-12-18T00:00:00Z

source:

  httpUrl: https://github.com/naftiko-capabilities/api-reusability
  sshUrl: git@github.com:-capabilities/api-reusability.git
  dockertHub: https://hub.docker.com/u/capability

support:

  issues: https://github.com/naftiko-capabilities/api-reusability/issues
  discussions: https://github.com/naftiko-capabilities/api-reusability/discussions
