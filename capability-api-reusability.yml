# This is an aggregate capability to manage API reusability across a domain catalog.
# This work is primarily to support multiple Naftiko Signals conversations and GTM.
# This will not be the final proposed capability schema, but a proposed version.

naftiko:

  schema:  'json-schema/capability.yml'

info:

  name: API Reusability
  description: This is an aggregate capability to help define, communicate, and incentivize API reusability.

  icon: https://example.com/api-icon.jpg

  tags:

    - APIs
    - Reusability
    - Catalogs
    - Communication
    - IDE

  jsonLd: >

    {
      "@context": "https://schema.org",
      "@type": "WebAPI"
    }  

  pinned: true
  featured: true

useCase:

  - $ref: 'use-case/api-reusability.yml' 

stakeholders:

  - FN: Kin Lane
    ROLE: Chief Community Officer (CCO)
    EMAIL: kinlane@naftiko.io
    SOCIALPROFILE: https://www.linkedin.com/in/kinlane/

  - FN: Persona
    ROLE: Architect
    EMAIL: persona@example.com
    SOCIALPROFILE: https://www.linkedin.com/in/persona/

  - FN: Persona
    ROLE: Integration Engineer
    SOCIALPROFILE: https://www.linkedin.com/in/persona/    

  - FN: Persona
    ROLE: API Engineer
    EMAIL: persona@example.com
    SOCIALPROFILE: https://www.linkedin.com/in/persona/       

capabilities:

  - $ref: 'capability-api-reusability-catalog.yml'  
  - $ref: 'capability-api-reusability-communicate.yml'  
  - $ref: 'capability-api-reusability-definition.yml'  
  - $ref: 'capability-api-reusability-incentivize.yml'        

events:

  - specversion: '1.0'
    type: com.github.catalog.pulled
    source: https://github.com/cloudevents/spec
    datacontenttype: application/json
    dataschema: https://github.com/cloudevents/spec/schemas/pr.json

  - specversion: '1.0'
    type: com.github.api.reuse.calculated
    source: https://github.com/cloudevents/spec
    datacontenttype: application/json
    dataschema: https://github.com/cloudevents/spec/schemas/pr.json    

  - specversion: '1.0'
    type: com.github.api.reuse.communicated
    source: https://github.com/cloudevents/spec
    datacontenttype: application/json
    dataschema: https://github.com/cloudevents/spec/schemas/pr.json         

change:

  state: New
  
  schemaVersion: 0.1.0
  capabilityVersion: 0.1.0

