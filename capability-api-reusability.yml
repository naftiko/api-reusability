standards:

  - name: Naftiko Capabilities
    description: This uses a exploratory schema to help inform and shape capabilities.
    docUrl: https://psychic-bassoon-z2vjvn4.pages.github.io/docs/capabilities/

  - name: OpenAPI
    description: This uses OpenAPI to define access to all HTTP APIs.
    docUrl: https://psychic-bassoon-z2vjvn4.pages.github.io/docs/standards/openapi/

  - name: Arazzo
    description: This uses Arazzo to define workflows used to support this capability.
    docUrl: https://psychic-bassoon-z2vjvn4.pages.github.io/docs/standards/arazzo/

  - name: JSON Schema
    description: This uses JSON Schema to define and validate all entities used.
    docUrl: https://psychic-bassoon-z2vjvn4.pages.github.io/docs/standards/json-schema/    

  - name: Spectral
    description: This uses Spectral rules to define and enforce policies across entities.
    docUrl: https://psychic-bassoon-z2vjvn4.pages.github.io/docs/standards/spectral/     

  - name: Model Context Protocol
    description: This uses MCP expresed as JSON schema to define each MCP server.
    docUrl: https://psychic-bassoon-z2vjvn4.pages.github.io/docs/standards/model-context-protocol/

  - name: Bruno Collections
    description: This uses Bruno Collections to define each executable HTTP API integration.
    docUrl: https://psychic-bassoon-z2vjvn4.pages.github.io/docs/standards/bruno-collections/        

  - name: Bruno Environments
    description: This uses Bruno Environments to store keys for each API to use in automation.
    docUrl: https://psychic-bassoon-z2vjvn4.pages.github.io/docs/standards/bruno-environments/  

  - name: API Commons
    description: This uses an API Commons schema to define the plans and rate limits.
    docUrl: https://psychic-bassoon-z2vjvn4.pages.github.io/docs/standards/api-commons/      

  - name: OAuth 2.0
    description: This uses a exploratory schema to help inform and shape capabilities.
    docUrl: https://psychic-bassoon-z2vjvn4.pages.github.io/docs/standards/oauth-20/       

services:

  - aid: aws-api-gateway
    name: AWS API Gateway
    description: Amazon API Gateway is a fully managed service that makes it easy for developers to create, publish, maintain, monitor, and secure APIs at any scale.
    docUrl: https://urban-adventure-6l4jvje.pages.github.io/docs/services/aws/
    apisJson: https://raw.githubusercontent.com/api-evangelist/aws/refs/heads/main/apis.yml
    loginUrl: https://console.aws.amazon.com/console/home/
    signUpUrl: https://portal.aws.amazon.com/gp/aws/developer/registration/index.html
    termsOfServiceUrl: https://aws.amazon.com/terms/?nc1=f_pr
    privacyPolicyUrl: https://aws.amazon.com/privacy/?nc1=f_pr
    plans:
      - $ref: 'api-commons/plans-aws-api-gateway.yml'    
    rateLimits:
      - $ref: 'api-commons/rate-limits-aws-api-gateway.yml'   

  - aid: github
    name: GitHub
    description: GitHub is a web-based platform for hosting and collaborating on software projects. It’s built around Git, a version control system that tracks changes to files over time.
    docUrl: https://urban-adventure-6l4jvje.pages.github.io/docs/services/github/
    apisJson: https://raw.githubusercontent.com/api-evangelist/github/refs/heads/main/apis.yml
    loginUrl: https://github.com/login
    signUpUrl: https://github.com/signup
    termsOfServiceUrl: https://docs.github.com/site-policy/github-terms/github-terms-of-service
    privacyPolicyUrl: https://docs.github.com/site-policy/privacy-policies/github-privacy-statement
    plans:
      - $ref: 'api-commons/plans-github.yml'    
    rateLimits:
      - $ref: 'api-commons/plans-github.yml'    

  - aid: splunk
    name: Splunk
    description: Splunk is a powerful software platform for searching, monitoring, and analyzing machine-generated data (logs, metrics, events) in real-time.
    docUrl: https://urban-adventure-6l4jvje.pages.github.io/docs/services/splunk/
    apisJson: https://raw.githubusercontent.com/api-evangelist/splunk/refs/heads/main/apis.yml
    loginUrl: https://login.splunk.com/
    signUpUrl: https://www.splunk.com/en_us/form/sign-up.html
    termsOfServiceUrl: https://www.splunk.com/en_us/legal/splunk-general-terms.html
    privacyPolicyUrl: https://www.splunk.com/en_us/about-splunk/splunk-data-security-and-privacy/data-privacy-at-splunk.html
    plans:
      - $ref: 'api-commons/plans-splunk.yml'    
    rateLimits:
      - $ref: 'api-commons/rate-limits-splunk.yml'   

  - aid: notion
    name: Notion
    description: Notion is an all-in-one workspace and productivity platform that combines notes, documents, databases, wikis, project management, and collaboration tools into a single application.
    docUrl: https://urban-adventure-6l4jvje.pages.github.io/docs/services/notion/
    apisJson: https://raw.githubusercontent.com/api-evangelist/notion/refs/heads/main/apis.yml
    loginUrl: https://www.notion.so/login
    signUpUrl: https://www.notion.so/signup
    termsOfServiceUrl: https://www.notion.so/terms
    privacyPolicyUrl: https://privacycenter.notion.so/policies
    plans:
      - $ref: 'api-commons/plans-notion.yml'    
    rateLimits:
      - $ref: 'api-commons/rate-limits-notion.yml'                             

observability: 

    visibility: Public  

